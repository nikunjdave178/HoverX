name: Release

# Push a version tag (e.g. `git tag v1.2.0 && git push origin v1.2.0`) and this
# builds HoverX.exe + HoverX_updater.exe, syncs hoverx/version.py and
# update.json to the tagged version, commits that back to main, and publishes
# a GitHub Release with both exes attached at the URL update.json expects.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync version metadata to the tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "__version__ = \"$VERSION\"" > hoverx/version.py
          cat > update.json <<EOF
          {
            "version": "$VERSION",
            "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/HoverX.exe",
            "notes": "Release ${{ github.ref_name }}"
          }
          EOF

      - name: Build HoverX.exe
        run: pyinstaller HoverX.spec --noconfirm

      - name: Build HoverX_updater.exe
        run: pyinstaller HoverX_updater.spec --noconfirm

      - name: Commit version metadata back to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hoverx/version.py update.json
          git diff --cached --quiet || git commit -m "Release ${{ github.ref_name }}: sync version metadata"
          git push origin HEAD:main

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" dist/HoverX.exe dist/HoverX_updater.exe --clobber
          else
            gh release create "${{ github.ref_name }}" dist/HoverX.exe dist/HoverX_updater.exe \
              --title "${{ github.ref_name }}" \
              --notes "Automated release for ${{ github.ref_name }}"
          fi
